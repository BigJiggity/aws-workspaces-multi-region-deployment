# ==============================================================================
# INCLUDE: load-secrets.yml
# Loads credentials from AWS Secrets Manager
#
# Usage in playbooks:
#   tasks:
#     - name: Load secrets from AWS Secrets Manager
#       include_tasks: load-secrets.yml
#
# This sets:
#   - ad_admin_password / ad_password
#   - ad_safe_mode_password
#   - svc_workspaces_password / svc_password
#   - svc_adconnector_password
# ==============================================================================
---
- name: Get secrets from AWS Secrets Manager
  ansible.builtin.command:
    cmd: >
      aws secretsmanager get-secret-value
      --region us-east-2
      --secret-id org-infrastructure/credentials
      --query SecretString
      --output text
  register: secrets_result
  changed_when: false
  delegate_to: localhost
  no_log: true

- name: Parse and set credential facts
  ansible.builtin.set_fact:
    ad_admin_password: "{{ (secrets_result.stdout | from_json).ad_admin_password }}"
    ad_safe_mode_password: "{{ (secrets_result.stdout | from_json).ad_safe_mode_password }}"
    svc_workspaces_password: "{{ (secrets_result.stdout | from_json).svc_workspaces_password }}"
    svc_adconnector_password: "{{ (secrets_result.stdout | from_json).svc_adconnector_password }}"
    ad_password: "{{ (secrets_result.stdout | from_json).ad_admin_password }}"
    svc_password: "{{ (secrets_result.stdout | from_json).svc_workspaces_password }}"
  no_log: true

- name: Confirm secrets loaded
  ansible.builtin.debug:
    msg: "✓ Credentials loaded from AWS Secrets Manager"
