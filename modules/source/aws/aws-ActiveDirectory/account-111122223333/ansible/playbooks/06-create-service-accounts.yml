# ==============================================================================
# PLAYBOOK: 06-create-service-accounts.yml
# Creates service accounts for AD Connector and WorkSpaces
#
# Prerequisites:
#   - All DCs must be promoted and replicating
#
# Run: ansible-playbook playbooks/06-create-service-accounts.yml
# ==============================================================================
---
- name: Create Service Accounts
  hosts: dc01
  gather_facts: true

  vars:
    # Override with environment variables
    ad_connector_password: "{{ lookup('env', 'AD_CONNECTOR_PASSWORD') | default('ChangeThisPassword123', true) }}"
    workspaces_svc_password: "{{ lookup('env', 'WORKSPACES_SVC_PASSWORD') | default('ChangeThisPassword456', true) }}"

  tasks:
    # --------------------------------------------------------------------------
    # Verify AD DS is Running
    # --------------------------------------------------------------------------
    - name: Verify AD DS is operational
      ansible.windows.win_shell: |
        $domain = Get-ADDomain
        Write-Output "Domain: $($domain.DNSRoot)"
      register: ad_check
      failed_when: ad_check.rc != 0

    # --------------------------------------------------------------------------
    # Create Organizational Unit for Service Accounts
    # --------------------------------------------------------------------------
    - name: Create Service Accounts OU
      ansible.windows.win_shell: |
        $ouPath = "OU=Service Accounts,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
        $ouName = "Service Accounts"
        
        try {
          $ou = Get-ADOrganizationalUnit -Identity $ouPath -ErrorAction Stop
          Write-Output "OU '$ouName' already exists"
        } catch {
          $parentDN = "{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
          New-ADOrganizationalUnit -Name $ouName -Path $parentDN -Description "Service accounts for AWS integrations"
          Write-Output "Created OU '$ouName'"
        }
      register: ou_result

    - name: Display OU result
      ansible.builtin.debug:
        var: ou_result.stdout

    # --------------------------------------------------------------------------
    # Create AD Connector Service Account
    # --------------------------------------------------------------------------
    - name: Create svc_adconnector account
      ansible.windows.win_shell: |
        $username = "svc_adconnector"
        $password = ConvertTo-SecureString "{{ ad_connector_password }}" -AsPlainText -Force
        $ouPath = "OU=Service Accounts,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
        
        $user = Get-ADUser -Filter "SamAccountName -eq '$username'" -ErrorAction SilentlyContinue
        
        if ($user) {
          # Update existing user
          Set-ADAccountPassword -Identity $username -NewPassword $password -Reset
          Set-ADUser -Identity $username -PasswordNeverExpires $true -Enabled $true
          Write-Output "Updated user '$username'"
        } else {
          # Create new user
          $params = @{
            Name                  = $username
            SamAccountName        = $username
            UserPrincipalName     = "$username@{{ ad_domain_name }}"
            Path                  = $ouPath
            AccountPassword       = $password
            Enabled               = $true
            PasswordNeverExpires  = $true
            CannotChangePassword  = $false
            Description           = "Service account for AWS AD Connector"
          }
          New-ADUser @params
          Write-Output "Created user '$username'"
        }
      register: svc_adconnector
      no_log: true

    - name: Display svc_adconnector result
      ansible.builtin.debug:
        var: svc_adconnector.stdout

    - name: Add svc_adconnector to Domain Admins
      ansible.windows.win_shell: |
        $username = "svc_adconnector"
        $group = "Domain Admins"
        
        $isMember = Get-ADGroupMember -Identity $group | Where-Object { $_.SamAccountName -eq $username }
        
        if ($isMember) {
          Write-Output "'$username' is already a member of '$group'"
        } else {
          Add-ADGroupMember -Identity $group -Members $username
          Write-Output "Added '$username' to '$group'"
        }
      register: group_membership

    - name: Display group membership result
      ansible.builtin.debug:
        var: group_membership.stdout

    # --------------------------------------------------------------------------
    # Create WorkSpaces Service Account
    # --------------------------------------------------------------------------
    - name: Create svc_workspaces account
      ansible.windows.win_shell: |
        $username = "svc_workspaces"
        $password = ConvertTo-SecureString "{{ workspaces_svc_password }}" -AsPlainText -Force
        $ouPath = "OU=Service Accounts,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
        
        $user = Get-ADUser -Filter "SamAccountName -eq '$username'" -ErrorAction SilentlyContinue
        
        if ($user) {
          Set-ADAccountPassword -Identity $username -NewPassword $password -Reset
          Set-ADUser -Identity $username -PasswordNeverExpires $true -Enabled $true
          Write-Output "Updated user '$username'"
        } else {
          $params = @{
            Name                  = $username
            SamAccountName        = $username
            UserPrincipalName     = "$username@{{ ad_domain_name }}"
            Path                  = $ouPath
            AccountPassword       = $password
            Enabled               = $true
            PasswordNeverExpires  = $true
            CannotChangePassword  = $false
            Description           = "Service account for AWS WorkSpaces"
          }
          New-ADUser @params
          Write-Output "Created user '$username'"
        }
      register: svc_workspaces
      no_log: true

    - name: Display svc_workspaces result
      ansible.builtin.debug:
        var: svc_workspaces.stdout

    # --------------------------------------------------------------------------
    # Create WorkSpaces Users OU
    # --------------------------------------------------------------------------
    - name: Create WorkSpaces Users OU
      ansible.windows.win_shell: |
        $ouPath = "OU=WorkSpaces Users,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
        $ouName = "WorkSpaces Users"
        
        try {
          $ou = Get-ADOrganizationalUnit -Identity $ouPath -ErrorAction Stop
          Write-Output "OU '$ouName' already exists"
        } catch {
          $parentDN = "{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
          New-ADOrganizationalUnit -Name $ouName -Path $parentDN -Description "Users for AWS WorkSpaces"
          Write-Output "Created OU '$ouName'"
        }
      register: workspaces_ou

    - name: Display WorkSpaces OU result
      ansible.builtin.debug:
        var: workspaces_ou.stdout

    # --------------------------------------------------------------------------
    # Create Sample WorkSpaces User
    # --------------------------------------------------------------------------
    - name: Create sample WorkSpaces user
      ansible.windows.win_shell: |
        $username = "testuser"
        $password = ConvertTo-SecureString "TempPassword123" -AsPlainText -Force
        $ouPath = "OU=WorkSpaces Users,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}"
        
        $user = Get-ADUser -Filter "SamAccountName -eq '$username'" -ErrorAction SilentlyContinue
        
        if ($user) {
          Write-Output "User '$username' already exists"
        } else {
          $params = @{
            Name                  = "Test User"
            GivenName             = "Test"
            Surname               = "User"
            SamAccountName        = $username
            UserPrincipalName     = "$username@{{ ad_domain_name }}"
            Path                  = $ouPath
            AccountPassword       = $password
            Enabled               = $true
            ChangePasswordAtLogon = $true
            Description           = "Sample WorkSpaces user for testing"
          }
          New-ADUser @params
          Write-Output "Created user '$username' (password: TempPassword123, must change at logon)"
        }
      register: test_user

    - name: Display test user result
      ansible.builtin.debug:
        var: test_user.stdout

    # --------------------------------------------------------------------------
    # Force Replication
    # --------------------------------------------------------------------------
    - name: Force AD replication to all DCs
      ansible.windows.win_shell: |
        repadmin /syncall /A /e /P
        Write-Output "Replication initiated"
      register: replication

    - name: Wait for replication
      ansible.windows.win_shell: |
        Start-Sleep -Seconds 30
        repadmin /replsummary
      register: repl_summary

    - name: Display replication summary
      ansible.builtin.debug:
        var: repl_summary.stdout_lines

    # --------------------------------------------------------------------------
    # Verify Accounts
    # --------------------------------------------------------------------------
    - name: List all service accounts
      ansible.windows.win_shell: |
        Get-ADUser -SearchBase "OU=Service Accounts,{{ 'DC=' + ad_domain_name.split('.') | join(',DC=') }}" -Filter * -Properties Description, MemberOf | 
          Select-Object Name, SamAccountName, Description, @{N='Groups';E={($_.MemberOf | ForEach-Object { ($_ -split ',')[0] -replace 'CN=' }) -join ', '}} |
          Format-Table -AutoSize | Out-String
      register: service_accounts

    - name: Display service accounts
      ansible.builtin.debug:
        var: service_accounts.stdout

    - name: Service accounts created
      ansible.builtin.debug:
        msg: |
          Service accounts have been created:
          
          AD Connector:
            Username: svc_adconnector@{{ ad_domain_name }}
            Groups: Domain Admins
            Use this account when configuring AD Connector in org-workspaces-vdi
          
          WorkSpaces:
            Username: svc_workspaces@{{ ad_domain_name }}
            Groups: Domain Users
          
          Test User:
            Username: testuser@{{ ad_domain_name }}
            Password: TempPassword123 (must change at first logon)
            Use this account to test WorkSpaces provisioning
          
          IMPORTANT: Update the AD_CONNECTOR_PASSWORD environment variable
          before deploying org-workspaces-vdi:
            export TF_VAR_ad_connector_password="{{ ad_connector_password }}"
