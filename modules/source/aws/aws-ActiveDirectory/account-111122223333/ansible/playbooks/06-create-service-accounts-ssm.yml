# ==============================================================================
# PLAYBOOK: 06-create-service-accounts-ssm.yml
# Creates service accounts and test users for WorkSpaces
#
# Run: ansible-playbook playbooks/06-create-service-accounts-ssm.yml
# ==============================================================================
---
- name: Create Service Accounts and Test Users
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars_files:
    - vars/main.yml

  vars:
    ansible_shell_type: sh

  tasks:
    # --------------------------------------------------------------------------
    # Load Secrets
    # --------------------------------------------------------------------------
    - name: Load secrets from AWS Secrets Manager
      include_tasks: load-secrets.yml

    # --------------------------------------------------------------------------
    # Create Organizational Units
    # --------------------------------------------------------------------------
    - name: Create OUs
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["$domain = (Get-ADDomain).DistinguishedName; try { Get-ADOrganizationalUnit -Identity \"OU=Service Accounts,$domain\" -ErrorAction Stop; Write-Output \"OU Service Accounts exists\" } catch { New-ADOrganizationalUnit -Name \"Service Accounts\" -Path $domain; Write-Output \"Created OU Service Accounts\" }; try { Get-ADOrganizationalUnit -Identity \"OU=WorkSpaces Users,$domain\" -ErrorAction Stop; Write-Output \"OU WorkSpaces Users exists\" } catch { New-ADOrganizationalUnit -Name \"WorkSpaces Users\" -Path $domain; Write-Output \"Created OU WorkSpaces Users\" }"]'
          --output json
      register: ou_cmd

    - name: Wait for OU creation
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (ou_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: ou_result
      until: ou_result is succeeded
      retries: 10
      delay: 5

    - name: Display OU result
      ansible.builtin.debug:
        msg: "{{ ou_result.stdout }}"

    # --------------------------------------------------------------------------
    # Create Service Accounts
    # --------------------------------------------------------------------------
    - name: Create svc_adconnector account
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["$domain = (Get-ADDomain).DistinguishedName; try { Get-ADUser -Identity svc_adconnector -ErrorAction Stop; Write-Output \"svc_adconnector exists\" } catch { $pw = ConvertTo-SecureString \"{{ svc_password }}\" -AsPlainText -Force; New-ADUser -Name \"svc_adconnector\" -SamAccountName \"svc_adconnector\" -UserPrincipalName \"svc_adconnector@example.internal\" -Path \"OU=Service Accounts,$domain\" -AccountPassword $pw -Enabled $true -PasswordNeverExpires $true -Description \"Service account for AWS AD Connector\"; Add-ADGroupMember -Identity \"Domain Admins\" -Members \"svc_adconnector\"; Write-Output \"Created svc_adconnector\" }"]'
          --output json
      register: svc1_cmd

    - name: Wait for svc_adconnector creation
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (svc1_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: svc1_result
      until: svc1_result is succeeded
      retries: 10
      delay: 5

    - name: Display svc_adconnector result
      ansible.builtin.debug:
        msg: "{{ svc1_result.stdout }}"

    - name: Create svc_workspaces account
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["$domain = (Get-ADDomain).DistinguishedName; try { Get-ADUser -Identity svc_workspaces -ErrorAction Stop; Write-Output \"svc_workspaces exists\" } catch { $pw = ConvertTo-SecureString \"{{ svc_password }}\" -AsPlainText -Force; New-ADUser -Name \"svc_workspaces\" -SamAccountName \"svc_workspaces\" -UserPrincipalName \"svc_workspaces@example.internal\" -Path \"OU=Service Accounts,$domain\" -AccountPassword $pw -Enabled $true -PasswordNeverExpires $true -Description \"Service account for AWS WorkSpaces\"; Write-Output \"Created svc_workspaces\" }"]'
          --output json
      register: svc2_cmd

    - name: Wait for svc_workspaces creation
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (svc2_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: svc2_result
      until: svc2_result is succeeded
      retries: 10
      delay: 5

    - name: Display svc_workspaces result
      ansible.builtin.debug:
        msg: "{{ svc2_result.stdout }}"

    # --------------------------------------------------------------------------
    # Create Test User
    # --------------------------------------------------------------------------
    - name: Create test user for WorkSpaces
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["$domain = (Get-ADDomain).DistinguishedName; try { Get-ADUser -Identity testuser -ErrorAction Stop; Write-Output \"testuser exists\" } catch { $pw = ConvertTo-SecureString \"TempP@ssw0rd123\" -AsPlainText -Force; New-ADUser -Name \"Test User\" -GivenName \"Test\" -Surname \"User\" -SamAccountName \"testuser\" -UserPrincipalName \"testuser@example.internal\" -Path \"OU=WorkSpaces Users,$domain\" -AccountPassword $pw -Enabled $true -ChangePasswordAtLogon $true -Description \"Test user for WorkSpaces\"; Write-Output \"Created testuser (password: TempP@ssw0rd123, must change at login)\" }"]'
          --output json
      register: testuser_cmd

    - name: Wait for test user creation
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (testuser_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: testuser_result
      until: testuser_result is succeeded
      retries: 10
      delay: 5

    - name: Display test user result
      ansible.builtin.debug:
        msg: "{{ testuser_result.stdout }}"

    # --------------------------------------------------------------------------
    # Force Replication
    # --------------------------------------------------------------------------
    - name: Force AD replication
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["repadmin /syncall /A /e /P; Write-Output \"Replication initiated\""]'
          --output json
      register: repl_cmd

    - name: Wait for replication
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (repl_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: repl_result
      until: repl_result is succeeded
      retries: 10
      delay: 5

    - name: Wait for replication to complete
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting 30 seconds for replication..."

    # --------------------------------------------------------------------------
    # Display Summary
    # --------------------------------------------------------------------------
    - name: Get accounts summary
      ansible.builtin.command:
        cmd: >
          aws ssm send-command
          --region {{ dc01.region }}
          --instance-ids {{ dc01.instance_id }}
          --document-name "AWS-RunPowerShellScript"
          --parameters commands='["Write-Output \"=== Service Accounts ===\"; Get-ADUser -Filter * -SearchBase \"OU=Service Accounts,DC=example,DC=internal\" -Properties Description,MemberOf | Format-Table Name,Description,@{N=\"Groups\";E={($_.MemberOf | ForEach-Object { ($_ -split \",\")[0] -replace \"CN=\",\"\" }) -join \", \"}} -AutoSize; Write-Output \"\n=== WorkSpaces Users ===\"; Get-ADUser -Filter * -SearchBase \"OU=WorkSpaces Users,DC=example,DC=internal\" -Properties Description | Format-Table Name,SamAccountName,Description -AutoSize"]'
          --output json
      register: summary_cmd

    - name: Wait for summary
      ansible.builtin.command:
        cmd: >
          aws ssm get-command-invocation
          --region {{ dc01.region }}
          --command-id {{ (summary_cmd.stdout | from_json).Command.CommandId }}
          --instance-id {{ dc01.instance_id }}
          --query "StandardOutputContent"
          --output text
      register: summary_result
      until: summary_result is succeeded
      retries: 10
      delay: 5

    - name: Display summary
      ansible.builtin.debug:
        msg: "{{ summary_result.stdout }}"

    # --------------------------------------------------------------------------
    # Complete
    # --------------------------------------------------------------------------
    - name: Service accounts created
      ansible.builtin.debug:
        msg: |
          ============================================
          SERVICE ACCOUNTS CREATED
          ============================================
          
          Service Accounts (OU=Service Accounts):
            - svc_adconnector (Domain Admins)
              Password: {{ svc_password }}
            - svc_workspaces (Domain Users)
              Password: {{ svc_password }}
          
          Test Users (OU=WorkSpaces Users):
            - testuser
              Password: TempP@ssw0rd123 (must change)
          
          AD Connector Configuration:
            - Username: svc_adconnector
            - Password: {{ svc_password }}
          
          ============================================
          ACTIVE DIRECTORY SETUP COMPLETE!
          ============================================
          
          You can now deploy:
            - org-workspaces-vdi with AD Connector
            - Any other AD-integrated services
          ============================================
