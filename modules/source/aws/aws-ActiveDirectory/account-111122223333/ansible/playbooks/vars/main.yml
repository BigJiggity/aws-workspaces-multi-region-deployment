# ------------------------------------------------------------------------------
# ACTIVE DIRECTORY CONFIGURATION
# ------------------------------------------------------------------------------
ad_domain_name: "example.internal"
ad_netbios_name: "ORG"
ad_forest_mode: "WinThreshold"
ad_domain_mode: "WinThreshold"

# ------------------------------------------------------------------------------
# PASSWORDS
# Credentials are stored in AWS Secrets Manager: org-infrastructure/credentials
#
# To load credentials in playbooks, add this at the start of tasks:
#   - name: Load secrets from AWS Secrets Manager
#     include_tasks: load-secrets.yml
#
# This will set these variables:
#   - ad_admin_password (also aliased as ad_password)
#   - ad_safe_mode_password
#   - svc_workspaces_password (also aliased as svc_password)
#   - svc_adconnector_password
#
# To update passwords:
#   aws secretsmanager update-secret --region us-east-2 \
#     --secret-id org-infrastructure/credentials \
#     --secret-string '{"ad_admin_password": "NEW_PASS", ...}'
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# AD SITES
# ------------------------------------------------------------------------------
