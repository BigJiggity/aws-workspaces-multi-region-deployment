# ==============================================================================
# ANSIBLE CONFIGURATION - Generic AWS AD account-111122223333
# Uses AWS CLI SSM commands (not aws_ssm connection plugin)
# ==============================================================================

[defaults]
# Inventory
inventory = inventory/hosts.yml

# Roles path
roles_path = roles

# Disable host key checking
host_key_checking = False

# Disable deprecation warnings
deprecation_warnings = False

# Increase timeout for Windows operations
timeout = 120

# Set forks to 1 to avoid SSM connection issues
forks = 1

# Retry failed connections
retry_files_enabled = True
retry_files_save_path = .retry

# Logging
log_path = ansible.log

# Callback plugins for better output (use result_format instead of yaml callback)
stdout_callback = default
result_format = yaml
callback_whitelist = profile_tasks

# Facts caching
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 3600

[ssh_connection]
pipelining = True

[persistent_connection]
command_timeout = 120
