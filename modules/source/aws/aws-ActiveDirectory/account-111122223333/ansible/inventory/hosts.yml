# ==============================================================================
# ANSIBLE INVENTORY - Generic AWS AD account-111122223333
# Note: Most playbooks run from localhost using AWS CLI SSM commands
# This inventory is kept for reference and potential future use
# ==============================================================================

all:
  children:
    # All domain controllers (for reference)
    domain_controllers:
      children:
        dc_us_east_2:
          vars:
            ansible_aws_ssm_region: us-east-2
            ad_site_name: "US-East-2"
          hosts:
            dc01:
              ansible_aws_ssm_instance_id: "i-0b8af16d1e6126ada"
              dc_role: primary
              dc_hostname: "DC01"
            dc02:
              ansible_aws_ssm_instance_id: "i-07847093f3e08bfd9"
              dc_role: secondary
              dc_hostname: "DC02"

        dc_ap_southeast_1:
          vars:
            ansible_aws_ssm_region: ap-southeast-1
            ad_site_name: "AP-Southeast-1"
          hosts:
            dc03:
              ansible_aws_ssm_instance_id: "i-041a564f209197fb9"
              dc_role: replica
              dc_hostname: "DC03"

    # Primary DC only
    primary_dc:
      hosts:
        dc01:

    # Secondary DCs
    secondary_dcs:
      hosts:
        dc02:
        dc03:

    # US-based DCs
    us_dcs:
      hosts:
        dc01:
        dc02:

    # AP-based DCs
    ap_dcs:
      hosts:
        dc03:
