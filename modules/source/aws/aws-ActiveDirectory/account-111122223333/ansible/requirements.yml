# ==============================================================================
# ANSIBLE GALAXY REQUIREMENTS
# Install with: ansible-galaxy install -r requirements.yml
# ==============================================================================

collections:
  # AWS collection - includes SSM connection plugin
  - name: amazon.aws
    version: ">=7.0.0"

  # Community AWS collection - additional AWS modules
  - name: community.aws
    version: ">=7.0.0"

  # Windows collection - Windows modules
  - name: ansible.windows
    version: ">=2.0.0"

  # Community Windows collection - additional Windows modules
  - name: community.windows
    version: ">=2.0.0"

  # General collection
  - name: community.general
    version: ">=8.0.0"
